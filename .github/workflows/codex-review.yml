name: Codex Review Scaffold

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  codex-review-scaffold:
    name: Codex Review Placeholder
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Basic repository sanity check
        run: |
          echo "Running Codex review scaffold checks..."
          test -f AGENTS.md
          test -f docs/protocols/project_execution_protocol.md
          test -f docs/standards/validation_matrix.md

